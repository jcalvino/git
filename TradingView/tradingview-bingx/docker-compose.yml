# ─────────────────────────────────────────────────────────────────
#  docker-compose — traz todo o stack em um comando, em qualquer OS.
#
#  Requisitos no host:
#    - Docker Desktop (Win/Mac) ou Docker Engine (Linux).
#    - Nada mais. Sem Node, sem npm, sem instalar deps.
#
#  Uso normal:
#    npm run docker:up        # = docker compose up -d --build
#    npm run docker:logs      # = docker compose logs -f app
#    npm run docker:down      # = docker compose down
#    npm run docker:reset     # = down -v + up -d --build (apaga DB)
#
#  Atualização depois de mexer no código:
#    npm run docker:up        # rebuilda e sobe em cima da imagem
#                             # anterior. As camadas cacheadas
#                             # continuam até o ponto onde algo
#                             # mudou.
#
#  O que persiste entre rebuilds (bind mounts no host):
#    ./data/         → SQLite, logs, snapshots, pids.json
#    ./research/     → Outputs dos scripts (explain-signal,
#                      regime-snapshot, weekly-report)
#    ./rules.json    → Contexto macro (editável sem rebuild)
#    ./monitors.json → Monitores de preço (editável sem rebuild)
#
#  O que NÃO é montado (vive dentro da imagem):
#    src/, scripts/, skills/, dashboard/dist — mudanças exigem
#    rebuild (`npm run docker:up`).
# ─────────────────────────────────────────────────────────────────

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tradingview-bingx:latest
    container_name: tradingview-bingx
    restart: unless-stopped

    # Lê variáveis do .env no host (não vai para a imagem em si).
    env_file:
      - .env

    ports:
      - "3000:3000"   # dashboard (estático + proxy /api → :3001)
      - "3001:3001"   # REST API (exposta direto também, útil p/ debug)

    volumes:
      # Persistência: banco SQLite + logs + state
      - ./data:/app/data
      # Outputs de scripts de research (explain-signal, snapshots, etc.)
      - ./research:/app/research
      # Config editável sem rebuild — o container relê a cada scan
      - ./rules.json:/app/rules.json:ro
      - ./monitors.json:/app/monitors.json:ro

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
