## Opcional — só use se quiser dashboard web acessível na rede Tailscale
## (preferível: não suba dashboard; use apenas o bot Telegram).
##
## Instalação:
##   sudo apt install nginx
##   sudo cp deploy/aws/nginx.conf /etc/nginx/sites-available/claudecode-trade
##   sudo ln -s /etc/nginx/sites-available/claudecode-trade /etc/nginx/sites-enabled/
##   sudo rm -f /etc/nginx/sites-enabled/default
##   sudo nginx -t && sudo systemctl reload nginx
##
## Isso serve:
##   - Estáticos do dashboard (dashboard/dist/) em /
##   - Proxy /api/ → API local :3001
##
## Nginx faz bind em 100.x.y.z:8080 (IP Tailscale) — NUNCA expor publicamente.
## Acesse de https://trade-bot:8080 (pelo MagicDNS do Tailscale).

server {
    # Bind apenas na interface Tailscale
    listen 100.64.0.0:8080 default_server;
    # Ou se preferir "qualquer interface" mas confiando em UFW:
    # listen 8080 default_server;

    server_name _;

    # Logs
    access_log /var/log/nginx/claudecode-trade.access.log;
    error_log  /var/log/nginx/claudecode-trade.error.log;

    # Root: build do dashboard Vite
    root /opt/claudecode-trade/dashboard/dist;
    index index.html;

    # Cache longo para assets com hash; HTML sem cache
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|svg|png|jpg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Segurança básica
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    # Desabilita expor versão
    server_tokens off;
}
